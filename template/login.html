<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="mesh-bg">
        <div class="mesh-blob blob-purple"></div>
        <div class="mesh-blob blob-teal"></div>
        <div class="mesh-blob blob-pink"></div>
    </div>

    <div class="page-wrap">
        <div class="card" style="max-width: 420px;">

            <div style="text-align:center;">
                <span class="badge-pill">Admin Access</span>
            </div>

            <div class="card-head">
                <h1>Welcome Back</h1>
                <p>Secure portal — authorized personnel only.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST" id="login-form">

                <div class="field">
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off">
                </div>

                <div class="field">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn-submit" id="login-btn">
                    Access Portal <span class="btn-arrow">→</span>
                </button>

            </form>

            <div class="card-footer-link">
                <a href="/">← Back to Registration</a>
            </div>

        </div>
    </div>

    <script>
    document.getElementById('login-form').addEventListener('submit', function() {
        const btn = document.getElementById('login-btn');
        btn.textContent = 'Authenticating…';
        btn.style.opacity = '0.8';
    });
    </script>

</body>
</html>
